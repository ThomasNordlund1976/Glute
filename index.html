<title>Measurements</title>
<style>












:root {
  --bg: #0a0c10;
  --bg2: #10131a;
  --bg3: #161a24;
  --surface: #1c2030;
  --surface2: #222840;
  --border: #2a3048;
  --border2: #333d5a;
  --accent: #4fc3f7;
  --accent2: #0288d1;
  --accent-dim: rgba(79,195,247,0.12);
  --gold: #ffd54f;
  --green: #69f0ae;
  --red: #ff5252;
  --text: #e8eaf6;
  --text2: #8892b0;
  --text3: #4a5578;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', -apple-system, sans-serif; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.view { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: 80px; }
.hidden { display: none; }

/* NAV */
nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px; background: none; border: none; color: var(--text3); font-family: 'DM Sans', -apple-system, sans-serif; font-size: 10px; font-weight: 500; cursor: pointer; }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn.active { color: var(--accent); }

/* PAGE HEADER */
.page-header { padding: 20px 20px 14px; padding-top: calc(20px + env(safe-area-inset-top)); position: sticky; top: 0; background: var(--bg); z-index: 50; border-bottom: 1px solid var(--border); }
.page-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 0.04em; line-height: 1; color: var(--text); }
.page-header h1 span { color: var(--accent); }
.page-header p { font-size: 12px; color: var(--text2); margin-top: 3px; font-weight: 300; }

/* LOG VIEW */
.log-content { padding: 16px; }

.section-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }

.entry-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
.entry-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--border); }
.entry-date { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.04em; color: var(--text); }
.entry-delete { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px; font-size: 18px; line-height: 1; }
.entry-delete:active { color: var(--red); }
.entry-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); }
.entry-cell { background: var(--surface); padding: 10px 12px; }
.entry-cell-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); font-family: 'DM Mono', monospace; }
.entry-cell-val { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text); margin-top: 2px; }
.entry-cell-val.accent { color: var(--accent); }
.entry-cell-val.gold { color: var(--gold); }
.entry-cell-delta { font-size: 10px; font-family: 'DM Mono', monospace; margin-top: 1px; }
.delta-up { color: var(--green); }
.delta-down { color: var(--red); }
.delta-neutral { color: var(--text3); }

.empty-state { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 13px; }

/* ADD BUTTON */
.fab { position: fixed; bottom: calc(72px + env(safe-area-inset-bottom)); right: 20px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 99; box-shadow: 0 4px 20px rgba(79,195,247,0.3); transition: transform 0.15s; }
.fab:active { transform: scale(0.94); }

/* MODAL / FORM SHEET */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.overlay.open { opacity: 1; pointer-events: all; }
.sheet { background: var(--bg2); border-radius: 20px 20px 0 0; width: 100%; max-height: 92vh; overflow-y: auto; padding-bottom: calc(24px + env(safe-area-inset-bottom)); transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32,0.72,0,1); }
.overlay.open .sheet { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 12px auto 0; }
.sheet-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 0.04em; color: var(--text); padding: 14px 20px 4px; }
.sheet-sub { font-size: 12px; color: var(--text2); padding: 0 20px 14px; border-bottom: 1px solid var(--border); }

/* FORM FIELDS */
.form-section { padding: 14px 20px 0; }
.form-section-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.form-field { display: flex; flex-direction: column; gap: 4px; }
.form-field.full { grid-column: 1 / -1; }
.form-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); font-family: 'DM Mono', monospace; }
.form-label span { color: var(--text3); font-size: 9px; }
.form-input { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; padding: 10px 12px; outline: none; -webkit-appearance: none; appearance: none; }
.form-input:focus { border-color: var(--accent); }
input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }
.form-actions { padding: 14px 20px 0; display: flex; flex-direction: column; gap: 8px; }
.btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 14px; border-radius: var(--radius); border: none; font-family: 'DM Sans', -apple-system, sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-primary { background: var(--accent); color: #0a0c10; }
.btn-ghost { background: var(--surface2); color: var(--text2); }

/* TRENDS VIEW */
.trends-content { padding: 16px; }
.metric-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.metric-chip { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; cursor: pointer; white-space: nowrap; }
.metric-chip.active { background: var(--accent); color: #0a0c10; border-color: var(--accent); font-weight: 700; }

.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
.chart-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
.chart-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); }
.chart-latest { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent); line-height: 1; }
.chart-unit { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-left: 3px; }
.chart-delta { font-size: 11px; font-family: 'DM Mono', monospace; margin-bottom: 10px; }
.chart-wrap { position: relative; width: 100%; height: 120px; }
.no-data { font-size: 12px; color: var(--text3); font-style: italic; padding: 20px 0; text-align: center; }

/* STATS */
.stats-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.stat-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--text); line-height: 1; }
.stat-unit { font-size: 11px; color: var(--text3); margin-left: 2px; font-family: 'DM Mono', monospace; }
.stat-change { font-size: 11px; font-family: 'DM Mono', monospace; margin-top: 2px; }

::-webkit-scrollbar { width: 0; background: transparent; }

.figure-wrap { width: 100%; background: var(--bg3); border-bottom: 1px solid var(--border); display: flex; justify-content: center; align-items: center; padding: 0; overflow: visible; }
.figure-wrap svg { width: 100%; max-width: 360px; height: auto; display: block; }
.fig-label { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; fill: #2a3048; transition: fill 0.15s; }
.fig-label.active { fill: #4fc3f7; }
.fig-line { stroke: #2a3048; stroke-width: 0.8; }
.fig-line.active { stroke: #4fc3f7; }


.page-figure { width:100%; padding:20px 8px 12px; display:flex; justify-content:center; border-bottom:1px solid var(--border); }
.figure-wrap { width:100%; border-bottom:1px solid var(--border); display:flex; justify-content:center; padding:16px 8px 10px; }


.page-figure { width:100%; padding:20px 4px 12px; display:flex; justify-content:center; border-bottom:1px solid var(--border); }
.figure-wrap { width:100%; border-bottom:1px solid var(--border); display:flex; justify-content:center; padding:16px 4px 10px; }


.page-figure { width:100%; padding:12px 0 8px; display:flex; justify-content:center; border-bottom:1px solid var(--border); background:var(--bg); }
.figure-wrap { width:100%; border-bottom:1px solid var(--border); display:flex; justify-content:center; padding:12px 0 8px; background:var(--bg3); }

</style>

var curTab = "log";

function dbLoad() { try { return JSON.parse(localStorage.getItem("measurements_v1") || "[]"); } catch(e) { return []; } }
function dbSave(d) { try { localStorage.setItem("measurements_v1", JSON.stringify(d)); } catch(e) {} }
function g(id) { return document.getElementById(id); }

function setTab(tab) {
  curTab = tab;
  ["log","trends","stats"].forEach(function(t) {
    g("nb-"+t).classList.toggle("active", t===tab);
    var v = g("v-"+t);
    if (t===tab) v.classList.remove("hidden"); else v.classList.add("hidden");
  });
  g("fab").style.display = tab==="log" ? "flex" : "none";
  if (tab==="log") renderLog();
  if (tab==="trends") renderTrends();
  if (tab==="stats") renderStats();
}

function formatDate(iso) {
  var d = new Date(iso);
  var days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return days[d.getDay()] + " " + d.getDate() + " " + months[d.getMonth()] + " " + d.getFullYear();
}

function today() {
  var d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function delta(cur, prev, invert) {
  if (prev == null || cur == null) return "";
  var diff = parseFloat((cur - prev).toFixed(1));
  if (diff === 0) return '<span class="delta-neutral">no change</span>';
  var sign = diff > 0 ? "+" : "";
  var good = invert ? diff < 0 : diff > 0;
  var cls = good ? "delta-up" : "delta-down";
  return '<span class="' + cls + '">' + sign + diff + '</span>';
}


function renderLog() {
  var data = dbLoad();
  data.sort(function(a,b){ return b.date.localeCompare(a.date); });

  if (!data.length) {
    g("v-log").innerHTML =
      '<div class="page-header"><h1>BODY <span>TRACKER</span></h1><p>No entries yet</p></div>' +
      '<div class="page-figure">' + FIGURE_HTML + '</div>' +
      '<div style="text-align:center;padding:12px 20px 24px;font-size:13px;color:var(--text3)">Tap + to log your first measurements</div>';
    updateFigureLabels();
    return;
  }

  var html = '<div class="page-header"><h1>BODY <span>TRACKER</span></h1><p>' + data.length + ' entr' + (data.length===1?"y":"ies") + ' logged</p></div>' +
    '<div class="page-figure">' + FIGURE_HTML + '</div>' +
    '<div class="log-content">';

  data.forEach(function(entry, idx) {
    var prev = data[idx+1] || null;
    html += '<div class="entry-card">';
    html += '<div class="entry-header">';
    html += '<div class="entry-date">' + formatDate(entry.date) + '</div>';
    html += '<button class="entry-delete" onclick="deleteEntry(\'' + entry.date + '\')">&#x2715;</button>';
    html += '</div>';
    html += '<div class="entry-grid">';

    FIELDS.forEach(function(f) {
      var val = entry[f.id];
      if (val == null || val === "") return;
      var prevVal = prev ? prev[f.id] : null;
      var d = delta(val, prevVal, f.id==="bodyfat"||f.id==="waist"||f.id==="hips");
      var valClass = f.id==="weight"?"gold":f.id==="bodyfat"?"":"accent";
      html += '<div class="entry-cell">';
      html += '<div class="entry-cell-label">' + f.label + '</div>';
      html += '<div class="entry-cell-val ' + valClass + '">' + val + '<span style="font-size:9px;color:var(--text3);margin-left:2px">' + f.unit + '</span></div>';
      if (d) html += '<div class="entry-cell-delta">' + d + '</div>';
      html += '</div>';
    });

    html += '</div></div>';
  });

  html += '</div>';
  g("v-log").innerHTML = html;
  updateFigureLabels();
}

function deleteEntry(date) {
  var data = dbLoad().filter(function(e){ return e.date !== date; });
  dbSave(data);
  renderLog();
  if (curTab === "trends") renderTrends();
}

function openForm() {
  var now = today();
  g("sheet-date-label").textContent = formatDate(now);
  var data = dbLoad();
  var existing = data.find(function(e){ return e.date === now; });
  FIELDS.forEach(function(f) {
    var el = g("f-" + f.id);
    if (el) el.value = existing && existing[f.id] != null ? existing[f.id] : "";
  });
  g("overlay").classList.add("open");
  updateFigureLabels();
}

function updateFigureLabels() {
  var VAL_COLOR  = "#e8f8ff";
  var LINE_COLOR = "#4fc3f7";
  var DIM        = "#2a6080";
  var data   = dbLoad();
  var latest = null;
  if (data.length) {
    data.sort(function(a,b){ return b.date.localeCompare(a.date); });
    latest = data[0];
  }
  var fids = ["height","weight","bodyfat","neck","chest","bicep","forearm","waist","hips","quad","calf"];
  fids.forEach(function(fid) {
    var field = FIELDS.find(function(f){ return f.id === fid; });
    var unit  = field ? " " + field.unit : "";
    var inp   = document.getElementById("f-" + fid);
    var val   = inp && inp.value ? inp.value : (latest && latest[fid] != null ? String(latest[fid]) : null);
    var display = val ? val + unit : "--";
    var color   = val ? VAL_COLOR : DIM;
    document.querySelectorAll("[id=fig-" + fid + "]").forEach(function(el) {
      el.textContent = display;
      el.setAttribute("fill", color);
    });
    var dot = document.getElementById("dot-" + fid);
    if (dot) dot.setAttribute("fill", val ? LINE_COLOR : DIM);
    var line = document.getElementById("line-" + fid);
    if (line) line.setAttribute("stroke", val ? LINE_COLOR : DIM);
  });
}

function closeForm() { g("overlay").classList.remove("open"); }
function overlayClick(e) { if (e.target === g("overlay")) closeForm(); }

function saveEntry() {
  var now = today();
  var data = dbLoad().filter(function(e){ return e.date !== now; });
  var entry = { date: now };
  var hasData = false;
  FIELDS.forEach(function(f) {
    var el = g("f-" + f.id);
    if (el && el.value !== "") {
      entry[f.id] = parseFloat(el.value);
      hasData = true;
    }
  });
  if (!hasData) { closeForm(); return; }
  data.push(entry);
  dbSave(data);
  closeForm();
  renderLog();
  if (curTab === "trends") renderTrends();
}

function renderTrends() {
  var data = dbLoad();
  data.sort(function(a,b){ return a.date.localeCompare(b.date); });

  var html = '<div class="page-header"><h1>TRENDS <span>&amp; PROGRESS</span></h1><p>All measurements over time</p></div>';
  html += '<div class="trends-content">';

  if (!data.length) {
    html += '<div class="empty-state"><p>No data yet. Log measurements in the Log tab.</p></div></div>';
    g("v-trends").innerHTML = html;
    return;
  }

  html += '<div class="section-title">Select metrics</div>';
  html += '<div class="metric-selector">';
  FIELDS.forEach(function(f) {
    var isActive = activeMetrics.indexOf(f.id) !== -1;
    html += '<button class="metric-chip' + (isActive?" active":"") + '" onclick="toggleMetric(\'' + f.id + '\')">' + f.label + '</button>';
  });
  html += '</div>';

  var latest = data[data.length-1];
  var first  = data[0];
  var hasMultiple = data.length > 1;

  html += '<div class="stats-grid">';
  html += '<div class="stat-card"><div class="stat-label">Entries</div><div class="stat-val">' + data.length + '</div></div>';

  var daySpan = 0;
  if (hasMultiple) {
    var d1 = new Date(first.date); var d2 = new Date(latest.date);
    daySpan = Math.round((d2-d1)/(1000*60*60*24));
  }
  html += '<div class="stat-card"><div class="stat-label">Span</div><div class="stat-val">' + (daySpan>0?daySpan:"--") + '<span class="stat-unit">days</span></div></div>';

  if (latest.weight) {
    var wChange = hasMultiple && first.weight ? parseFloat((latest.weight - first.weight).toFixed(1)) : null;
    html += '<div class="stat-card"><div class="stat-label">Current weight</div><div class="stat-val">' + latest.weight + '<span class="stat-unit">kg</span></div>' +
      (wChange!=null?'<div class="stat-change ' + (wChange<0?"delta-up":"delta-down") + '">' + (wChange>0?"+":"") + wChange + ' kg total</div>':'') + '</div>';
  }
  if (latest.bodyfat) {
    var bfChange = hasMultiple && first.bodyfat ? parseFloat((latest.bodyfat - first.bodyfat).toFixed(1)) : null;
    html += '<div class="stat-card"><div class="stat-label">Body fat</div><div class="stat-val">' + latest.bodyfat + '<span class="stat-unit">%</span></div>' +
      (bfChange!=null?'<div class="stat-change ' + (bfChange<0?"delta-up":"delta-down") + '">' + (bfChange>0?"+":"") + bfChange + '% total</div>':'') + '</div>';
  }
  html += '</div>';

  FIELDS.forEach(function(f) {
    if (activeMetrics.indexOf(f.id) === -1) return;
    var pts = data.filter(function(e){ return e[f.id] != null; });
    if (!pts.length) return;

    var latestVal = pts[pts.length-1][f.id];
    var firstVal  = pts[0][f.id];
    var change    = pts.length>1 ? parseFloat((latestVal - firstVal).toFixed(1)) : null;
    var isGoodDown = (f.id==="bodyfat"||f.id==="waist"||f.id==="hips");
    var changeClass = change==null?"":( (change<0&&isGoodDown)||(change>0&&!isGoodDown) ? "delta-up":"delta-down");

    html += '<div class="chart-card">';
    html += '<div class="chart-header">';
    html += '<div class="chart-title">' + f.label + '</div>';
    html += '<div><span class="chart-latest">' + latestVal + '</span><span class="chart-unit">' + f.unit + '</span></div>';
    html += '</div>';
    if (change !== null) {
      var sign = change>0?"+":"";
      html += '<div class="chart-delta ' + changeClass + '">' + sign + change + ' ' + f.unit + ' since first entry</div>';
    }

    if (pts.length < 2) {
      html += '<div class="no-data">Only 1 data point -- add more entries to see trends</div>';
    } else {
      html += '<div class="chart-wrap"><canvas id="chart-' + f.id + '"></canvas></div>';
    }
    html += '</div>';
  });

  html += '</div>';
  g("v-trends").innerHTML = html;

  setTimeout(function() {
    FIELDS.forEach(function(f) {
      if (activeMetrics.indexOf(f.id) === -1) return;
      var canvas = g("chart-" + f.id);
      if (!canvas) return;
      var pts = data.filter(function(e){ return e[f.id] != null; });
      if (pts.length < 2) return;

      if (chartInstances[f.id]) { try { chartInstances[f.id].destroy(); } catch(e){} }

      var labels = pts.map(function(e){
        var d = new Date(e.date);
        return (d.getMonth()+1) + "/" + d.getDate();
      });
      var values = pts.map(function(e){ return e[f.id]; });
      var mn = Math.min.apply(null,values);
      var mx = Math.max.apply(null,values);
      var pad = Math.max((mx-mn)*0.2, 1);

      chartInstances[f.id] = new Chart(canvas, {
        type: "line",
        data: {
          labels: labels,
          datasets: [{
            data: values,
            borderColor: f.color,
            backgroundColor: f.color + "22",
            borderWidth: 2,
            pointRadius: pts.length > 10 ? 2 : 4,
            pointBackgroundColor: f.color,
            fill: true,
            tension: 0.3,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: {
            backgroundColor: "#1c2030",
            borderColor: "#2a3048",
            borderWidth: 1,
            titleColor: "#8892b0",
            bodyColor: "#e8eaf6",
            callbacks: {
              label: function(ctx) { return ctx.parsed.y + " " + f.unit; }
            }
          }},
          scales: {
            x: {
              ticks: { color: "#4a5578", font: { size: 10, family: "'DM Mono', monospace" }, maxTicksLimit: 8, maxRotation: 0 },
              grid: { color: "#1c2030" },
              border: { color: "#2a3048" }
            },
            y: {
              min: parseFloat((mn - pad).toFixed(1)),
              max: parseFloat((mx + pad).toFixed(1)),
              ticks: { color: "#4a5578", font: { size: 10, family: "'DM Mono', monospace" }, maxTicksLimit: 5 },
              grid: { color: "#1c2030" },
              border: { color: "#2a3048" }
            }
          }
        }
      });
    });
  }, 50);
}

function toggleMetric(id) {
  var idx = activeMetrics.indexOf(id);
  if (idx === -1) { activeMetrics.push(id); }
  else if (activeMetrics.length > 1) { activeMetrics.splice(idx, 1); }
  renderTrends();
}


function updateFigureLabels() {
  var ACCENT = "#4fc3f7";
  var DIM    = "#2a3048";
  var data   = dbLoad();
  var latest = null;
  if (data.length) {
    data.sort(function(a,b){ return b.date.localeCompare(a.date); });
    latest = data[0];
  }
  var fids = ["height","weight","bodyfat","neck","chest","bicep","forearm","waist","hips","quad","calf"];
  fids.forEach(function(fid) {
    var field = FIELDS.find(function(f){ return f.id === fid; });
    var unit  = field ? " " + field.unit : "";
    var inp   = document.getElementById("f-" + fid);
    var val   = inp && inp.value ? inp.value : (latest && latest[fid] != null ? String(latest[fid]) : null);
    var display = val ? val + unit : "--";
    var color   = val ? ACCENT : DIM;
    document.querySelectorAll("[id=fig-" + fid + "]").forEach(function(el) {
      el.textContent = display;
      el.setAttribute("fill", color);
    });
    var dot = document.getElementById("dot-" + fid);
    if (dot) dot.setAttribute("fill", color);
    var line = document.getElementById("line-" + fid);
    if (line) line.setAttribute("stroke", val ? ACCENT : DIM);
  });
}

function openForm() {
  var now = today();
  g("sheet-date-label").textContent = formatDate(now);
  var data = dbLoad();
  var existing = data.find(function(e){ return e.date === now; });
  FIELDS.forEach(function(f) {
    var el = g("f-" + f.id);
    if (el) el.value = existing && existing[f.id] != null ? existing[f.id] : "";
  });
  g("overlay").classList.add("open");
  updateFigureLabels();
}

function closeForm() { g("overlay").classList.remove("open"); }
function overlayClick(e) { if (e.target === g("overlay")) closeForm(); }

document.addEventListener("input", function(e) {
  if (e.target && e.target.classList.contains("form-input")) {
    updateFigureLabels();
  }
});


function renderStats() {
  var data = dbLoad();
  var el = g("v-stats");

  el.innerHTML = '<div class="page-header"><h1>BODY <span>STATS</span></h1><p>Calculated from latest entry</p></div><div class="trends-content">';

  if (!data.length) {
    el.innerHTML += '<div class="empty-state"><p>No entries yet. Log measurements to see stats.</p></div></div>';
    return;
  }

  data.sort(function(a,b){ return b.date.localeCompare(a.date); });
  var d = data[0];
  var prev = data.length > 1 ? data[1] : null;

  var h   = d.height   ? d.height / 100 : null;  // metres
  var w   = d.weight   ? d.weight       : null;   // kg
  var bf  = d.bodyfat  ? d.bodyfat / 100: null;   // fraction
  var wst = d.waist    ? d.waist / 100   : null;  // metres
  var hip = d.hips     ? d.hips          : null;  // cm
  var cst = d.chest    ? d.chest         : null;  // cm
  var bic = d.bicep    ? d.bicep         : null;
  var calf= d.calf     ? d.calf          : null;
  var quad= d.quad     ? d.quad          : null;

  var html = "";

  // ---- BODY COMPOSITION ----
  html += '<div class="section-title">Body Composition</div>';
  html += '<div class="stats-grid">';

  if (h && w) {
    var bmi = w / (h * h);
    var bmiCat = bmi < 18.5 ? "Underweight" : bmi < 25 ? "Normal" : bmi < 30 ? "Overweight" : "Obese";
    var bmiColor = bmi < 18.5 ? "var(--accent)" : bmi < 25 ? "var(--green)" : bmi < 30 ? "var(--gold)" : "var(--red)";
    html += statCard("BMI", bmi.toFixed(1), "", bmiCat, bmiColor);
  }

  if (w && bf) {
    var fatKg  = (w * bf).toFixed(1);
    var leanKg = (w * (1 - bf)).toFixed(1);
    html += statCard("Fat Mass", fatKg, "kg", null, null);
    html += statCard("Lean Mass", leanKg, "kg", null, "var(--green)");
  }

  if (h && w && bf) {
    var lean = w * (1 - bf);
    var ffmi = lean / (h * h);
    var ffmiNote = ffmi < 18 ? "Below avg" : ffmi < 20 ? "Average" : ffmi < 22 ? "Above avg" : ffmi < 24 ? "Excellent" : ffmi < 26 ? "Superior" : "Elite";
    var ffmiColor = ffmi < 18 ? "var(--text2)" : ffmi < 22 ? "var(--accent)" : ffmi < 25 ? "var(--green)" : "var(--gold)";
    html += statCard("FFMI", ffmi.toFixed(1), "", ffmiNote, ffmiColor);
  }

  if (w && bf) {
    var rfm = bf * 100;
    var rfmNote = rfm < 8 ? "Essential" : rfm < 14 ? "Athletic" : rfm < 18 ? "Fitness" : rfm < 25 ? "Average" : "Above avg";
    html += statCard("Body Fat", rfm.toFixed(1), "%", rfmNote, null);
  }

  html += "</div>";

  // ---- PROPORTIONS ----
  if (wst || hip || cst) {
    html += '<div class="section-title" style="margin-top:16px">Proportions</div>';
    html += '<div class="stats-grid">';

    if (wst && hip) {
      var whr = (wst * 100 / hip);
      var whrNote = whr < 0.85 ? "Healthy" : whr < 0.9 ? "Moderate" : "High risk";
      var whrColor = whr < 0.85 ? "var(--green)" : whr < 0.9 ? "var(--gold)" : "var(--red)";
      html += statCard("Waist/Hip", whr.toFixed(2), "", whrNote, whrColor);
    }

    if (h && wst) {
      var whi = (wst / h);
      var whiNote = whi < 0.4 ? "Very low" : whi < 0.5 ? "Healthy" : whi < 0.6 ? "Elevated" : "High risk";
      var whiColor = whi < 0.5 ? "var(--green)" : whi < 0.6 ? "var(--gold)" : "var(--red)";
      html += statCard("Waist/Height", whi.toFixed(2), "", whiNote, whiColor);
    }

    if (cst && wst) {
      var vtaper = (cst / (wst * 100));
      html += statCard("V-Taper", vtaper.toFixed(2), "", "Chest / waist", "var(--accent)");
    }

    if (bic && calf) {
      var sym = Math.abs(bic - calf);
      var symNote = sym < 2 ? "Balanced" : sym < 4 ? "Minor diff" : "Notable diff";
      html += statCard("Bicep/Calf", (bic/calf).toFixed(2), "", symNote, "var(--accent)");
    }

    if (quad && calf) {
      html += statCard("Quad/Calf", (quad/calf).toFixed(2), "", "Lower sym.", "var(--accent)");
    }

    html += "</div>";
  }

  // ---- PROGRESS (if prev entry) ----
  if (prev) {
    html += '<div class="section-title" style="margin-top:16px">Since Last Entry</div>';
    html += '<div class="stats-grid">';

    if (d.weight && prev.weight) {
      var wDiff = (d.weight - prev.weight).toFixed(1);
      var wColor = wDiff < 0 ? "var(--green)" : wDiff > 0 ? "var(--red)" : "var(--text2)";
      html += statCard("Weight", (wDiff > 0 ? "+" : "") + wDiff, "kg", "vs previous", wColor);
    }

    if (d.weight && prev.weight && d.bodyfat && prev.bodyfat) {
      var prevLean = prev.weight * (1 - prev.bodyfat/100);
      var curLean  = d.weight   * (1 - d.bodyfat/100);
      var lDiff    = (curLean - prevLean).toFixed(1);
      var lColor   = lDiff > 0 ? "var(--green)" : "var(--red)";
      html += statCard("Lean mass", (lDiff > 0 ? "+" : "") + lDiff, "kg", "vs previous", lColor);

      var prevFat  = prev.weight * (prev.bodyfat/100);
      var curFat   = d.weight   * (d.bodyfat/100);
      var fDiff    = (curFat - prevFat).toFixed(1);
      var fColor   = fDiff < 0 ? "var(--green)" : "var(--red)";
      html += statCard("Fat mass", (fDiff > 0 ? "+" : "") + fDiff, "kg", "vs previous", fColor);
    }

    if (d.waist && prev.waist) {
      var wstDiff = (d.waist - prev.waist).toFixed(1);
      var wstColor = wstDiff < 0 ? "var(--green)" : "var(--red)";
      html += statCard("Waist", (wstDiff > 0 ? "+" : "") + wstDiff, "cm", "vs previous", wstColor);
    }

    html += "</div>";
  }

  html += "</div>";
  el.innerHTML += html;
}

function statCard(label, value, unit, note, color) {
  var valStyle = color ? 'color:' + color : 'color:var(--text)';
  return '<div class="stat-card">' +
    '<div class="stat-label">' + label + '</div>' +
    '<div class="stat-val" style="' + valStyle + '">' + value +
      (unit ? '<span class="stat-unit">' + unit + '</span>' : '') +
    '</div>' +
    (note ? '<div class="stat-change" style="color:var(--text3)">' + note + '</div>' : '') +
    '</div>';
}

setTab("log");

</script>
