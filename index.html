<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GluteBuilder">
<meta name="theme-color" content="#0d0a0e">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>GluteBuilder</title>
<style>
:root {
  --bg: #0d0a0e;
  --bg2: #130f14;
  --bg3: #1a141c;
  --surface: #201a22;
  --surface2: #27202a;
  --border: #332a36;
  --border2: #3d3342;
  --accent: #ff6eb4;
  --accent2: #c84b8a;
  --accent-dim: rgba(255,110,180,0.12);
  --accent-dim2: rgba(255,110,180,0.06);
  --gold: #f0c060;
  --text: #f5f0f6;
  --text2: #a090a8;
  --text3: #5a4d60;
  --glute: #ff6eb4;
  --core: #f0c060;
  --upper: #80c8ff;
  --pump: #b088ff;
  --rest: #3d3342;
  --radius: 14px;
  --radius-sm: 9px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', -apple-system, sans-serif; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.view { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: 80px; }
.hidden { display: none; }

/* NAV */
nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px; background: none; border: none; color: var(--text3); font-family: 'DM Sans', -apple-system, sans-serif; font-size: 10px; font-weight: 500; cursor: pointer; }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn.active { color: var(--accent); }

/* HEADER */
.page-header { padding: 20px 20px 14px; padding-top: calc(20px + env(safe-area-inset-top)); position: sticky; top: 0; background: var(--bg); z-index: 50; border-bottom: 1px solid var(--border); }
.page-header h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; line-height: 1.1; color: var(--text); }
.page-header h1 span { color: var(--accent); }
.page-header p { font-size: 12px; color: var(--text2); margin-top: 4px; font-weight: 300; }

/* WEEK STRIP */
.week-strip { display: flex; gap: 8px; padding: 14px 20px; overflow-x: auto; scrollbar-width: none; }
.week-strip::-webkit-scrollbar { display: none; }
.wchip { flex-shrink: 0; padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; }
.wchip.active { background: var(--accent); color: #0d0a0e; border-color: var(--accent); font-weight: 700; }
.wchip.peak { border-color: rgba(255,110,180,0.4); }

/* WEEK BANNER */
.week-banner { margin: 0 16px 12px; border-radius: var(--radius); padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.wb-left { display: flex; flex-direction: column; gap: 2px; }
.wb-phase { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; }
.wb-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.1; }
.wb-stats { display: flex; gap: 14px; flex-shrink: 0; }
.wb-stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.wb-val { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; line-height: 1; }
.wb-lbl { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); font-family: 'DM Mono', monospace; }

.p-build { background: rgba(255,110,180,0.08); border: 1px solid rgba(255,110,180,0.2); }
.p-build .wb-phase, .p-build .wb-val { color: var(--accent); }
.p-deload { background: rgba(240,192,96,0.07); border: 1px solid rgba(240,192,96,0.2); }
.p-deload .wb-phase, .p-deload .wb-val { color: var(--gold); }
.p-peak { background: rgba(176,136,255,0.08); border: 1px solid rgba(176,136,255,0.2); }
.p-peak .wb-phase, .p-peak .wb-val { color: var(--pump); }

/* COACH NOTE */
.coach-note { margin: 0 16px 16px; padding: 12px 14px; background: var(--surface); border-radius: var(--radius-sm); border-left: 3px solid var(--accent); font-size: 12px; color: var(--text2); line-height: 1.65; font-weight: 300; }

/* WEEK COMPLETE */
.week-complete-bar { margin: 0 16px 12px; padding: 10px 14px; background: rgba(255,110,180,0.1); border: 1px solid rgba(255,110,180,0.3); border-radius: var(--radius-sm); display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--accent); font-weight: 600; }

/* DAY CARD */
.day-section { margin: 0 16px 14px; }
.day-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: var(--radius) var(--radius) 0 0; border: 1px solid var(--border); border-bottom: none; }
.day-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.day-day { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; letter-spacing: 0.08em; }
.day-type { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; line-height: 1.1; flex: 1; }
.day-sub { font-size: 10px; color: var(--text2); }

.t-glute .day-type { color: var(--glute); } .t-glute .day-dot { background: var(--glute); } .t-glute .day-header { background: rgba(255,110,180,0.06); border-color: rgba(255,110,180,0.25); }
.t-core  .day-type { color: var(--core);  } .t-core  .day-dot { background: var(--core);  } .t-core  .day-header { background: rgba(240,192,96,0.06);  border-color: rgba(240,192,96,0.25); }
.t-upper .day-type { color: var(--upper); } .t-upper .day-dot { background: var(--upper); } .t-upper .day-header { background: rgba(128,200,255,0.06); border-color: rgba(128,200,255,0.25); }
.t-pump  .day-type { color: var(--pump);  } .t-pump  .day-dot { background: var(--pump);  } .t-pump  .day-header { background: rgba(176,136,255,0.06); border-color: rgba(176,136,255,0.25); }
.t-rest  .day-type { color: var(--rest);  } .t-rest  .day-dot { background: var(--rest);  } .t-rest  .day-header { background: var(--surface); border-color: var(--border); opacity: 0.5; }

.ex-list { background: var(--surface); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); overflow: hidden; }
.ex-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer; gap: 10px; }
.ex-row:last-child { border-bottom: none; }
.ex-row:active { background: var(--surface2); }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ex-last { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
.ex-last.has { color: var(--text2); }
.ex-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.ex-rx { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
.ex-bubble { width: 30px; height: 30px; border-radius: 50%; background: var(--bg3); border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; color: var(--text3); }
.ex-bubble.done { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.rest-msg { padding: 14px; font-size: 12px; color: var(--text3); font-style: italic; }

/* MODAL */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--bg2); border-radius: 20px 20px 0 0; width: 100%; max-height: 90vh; overflow-y: auto; padding-bottom: calc(24px + env(safe-area-inset-bottom)); transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32,0.72,0,1); }
.overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 12px auto 0; }
.modal-head { padding: 14px 20px 12px; border-bottom: 1px solid var(--border); }
.modal-daytype { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.1; cursor: pointer; border-bottom: 1px dashed rgba(255,110,180,0.35); display: inline-block; padding-bottom: 2px; }
.modal-title-hint { font-size: 14px; color: var(--accent); vertical-align: middle; }
.modal-sub { font-size: 12px; color: var(--text2); margin-top: 6px; font-family: 'DM Mono', monospace; }
.modal-hint { font-size: 11px; color: var(--text3); margin-top: 5px; font-family: 'DM Mono', monospace; }

/* SET LOGGER */
.set-logger { padding: 16px 20px; }
.logger-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 12px; }
.set-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.set-num { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); width: 36px; text-align: center; flex-shrink: 0; }
.set-inputs { display: flex; gap: 8px; flex: 1; }
.field-wrap { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.field-lbl { font-size: 9px; text-align: center; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
.set-input { width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; text-align: center; padding: 10px 6px; outline: none; -webkit-appearance: none; appearance: none; }
.set-input:focus { border-color: var(--accent); }
input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }
.check-btn { width: 38px; height: 46px; border-radius: var(--radius-sm); border: 1.5px solid var(--border2); background: transparent; color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.check-btn.done { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* HISTORY */
.history-sec { padding: 0 20px 16px; border-top: 1px solid var(--border); }
.history-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); font-family: 'DM Mono', monospace; padding: 14px 0 10px; }
.hist-entry { margin-bottom: 10px; }
.hist-wk { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 4px; }
.hist-sets { display: flex; gap: 6px; flex-wrap: wrap; }
.hist-set { padding: 4px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); }
.no-hist { font-size: 12px; color: var(--text3); font-style: italic; }

/* MODAL ACTIONS */
.modal-actions { padding: 8px 20px 0; display: flex; flex-direction: column; gap: 8px; }
.btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 14px; border-radius: var(--radius); border: none; font-family: 'DM Sans', -apple-system, sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-primary { background: var(--accent); color: #0d0a0e; }
.btn-ghost { background: var(--surface2); color: var(--text2); }

/* REST TIMER */
.timer-bar { position: fixed; bottom: -200px; left: 0; right: 0; z-index: 150; transition: bottom 0.3s cubic-bezier(0.32,0.72,0,1); pointer-events: none; }
.timer-bar.visible { bottom: calc(58px + env(safe-area-inset-bottom)); pointer-events: all; }
.timer-inner { margin: 0 12px 8px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px 14px; display: flex; align-items: center; gap: 12px; box-shadow: 0 -4px 24px rgba(0,0,0,0.4); }
.timer-ring { position: relative; width: 40px; height: 40px; flex-shrink: 0; }
.timer-ring svg { transform: rotate(-90deg); }
.timer-ring-bg { fill: none; stroke: var(--border2); stroke-width: 3; }
.timer-ring-fg { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.timer-ring-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.timer-text { flex: 1; }
.timer-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.08em; }
.timer-countdown { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; color: var(--text); line-height: 1; }
.timer-countdown.done { color: var(--accent); }
.timer-actions { display: flex; gap: 8px; }
.timer-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; }
.timer-btn.accent { background: var(--accent); color: #0d0a0e; border-color: var(--accent); font-weight: 700; }

/* EX INFO POPUP */
.ex-info-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.ex-info-overlay.open { opacity: 1; pointer-events: all; }
.ex-info-popup { background: var(--bg2); border-radius: 20px 20px 0 0; width: 100%; max-height: 80vh; overflow-y: auto; padding-bottom: calc(24px + env(safe-area-inset-bottom)); transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32,0.72,0,1); }
.ex-info-overlay.open .ex-info-popup { transform: translateY(0); }
.ex-info-body { padding: 16px 20px 8px; }
.ex-info-name { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--text); line-height: 1.1; margin-bottom: 4px; }
.ex-info-muscle { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
.ex-info-section { margin-bottom: 14px; }
.ex-info-section-title { font-size: 11px; font-weight: 600; color: var(--text); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
.ex-info-text { font-size: 13px; color: var(--text2); line-height: 1.7; font-weight: 300; }
.ex-info-tips { list-style: none; }
.ex-info-tips li { font-size: 13px; color: var(--text2); line-height: 1.6; font-weight: 300; padding: 4px 0 4px 14px; position: relative; }
.ex-info-tips li::before { content: ""; position: absolute; left: 0; top: 11px; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

/* PROGRESS */
.prog-content { padding: 16px; }
.prog-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
.prog-card-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
.stat-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.stat-row:last-child { margin-bottom: 0; }
.stat-name { font-size: 13px; color: var(--text2); }
.stat-val { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--accent); line-height: 1; }
.stat-unit { font-size: 11px; color: var(--text3); margin-left: 3px; font-family: 'DM Mono', monospace; }
.progress-bar-wrap { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-top: 8px; }
.progress-bar { height: 100%; background: var(--accent); border-radius: 3px; }
.pr-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.pr-row:last-child { border-bottom: none; }
.pr-ex { font-size: 12px; color: var(--text2); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pr-val { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); flex-shrink: 0; margin-left: 12px; }

/* OVERVIEW */
.ov-content { padding: 16px; }
.phase-card { border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 12px; }
.pc-head { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; }
.pc-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; line-height: 1.1; }
.pc-weeks { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); }
.pc-body { padding: 10px 14px 14px; background: var(--surface); display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.pc-stat-val { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; line-height: 1; }
.pc-stat-lbl { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }
.pc-note { padding: 10px 14px 12px; background: var(--surface); border-top: 1px solid var(--border); font-size: 11px; color: var(--text2); line-height: 1.6; font-weight: 300; }
.pc-b .pc-head { background: rgba(255,110,180,0.08); } .pc-b .pc-name { color: var(--accent); }
.pc-d .pc-head { background: rgba(240,192,96,0.07); } .pc-d .pc-name { color: var(--gold); }
.pc-p .pc-head { background: rgba(176,136,255,0.08); } .pc-p .pc-name { color: var(--pump); }
.info-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
.info-card-head { padding: 12px 14px; background: var(--bg3); border-bottom: 1px solid var(--border); font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }
.info-row { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-bottom: 1px solid var(--border); }
.info-row:last-child { border-bottom: none; }
.info-dot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
.info-day { width: 28px; font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; flex-shrink: 0; }
.info-label { font-size: 13px; font-weight: 600; color: var(--text); }
.info-sub { font-size: 11px; color: var(--text2); font-weight: 300; }
.prin-row { padding: 12px 14px; border-bottom: 1px solid var(--border); }
.prin-row:last-child { border-bottom: none; }
.prin-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.prin-desc { font-size: 11px; color: var(--text2); line-height: 1.6; font-weight: 300; }
::-webkit-scrollbar { width: 0; background: transparent; }
.quick-done-btn { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; }
.quick-done-btn.all-done { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.day-done-btn { margin-left: auto; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; cursor: pointer; white-space: nowrap; }
.day-done-btn.done { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

.timer-adjust { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px 4px; border-top: 1px solid var(--border); margin-top: 4px; }
.timer-adjust-label { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; letter-spacing: 0.06em; }
.timer-dur-pick { display: flex; gap: 6px; }
.dur-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; -webkit-appearance: none; appearance: none; }

.dur-btn.active { background: var(--accent); color: #0a0a0c; border-color: var(--accent); font-weight: 700; }
</style>
</head>
<body>
<div id="app">
  <div id="v-workout" class="view"></div>
  <div id="v-progress" class="view hidden"></div>
  <div id="v-overview" class="view hidden"></div>
  <nav>
    <button class="nav-btn active" id="nb-workout" onclick="setTab('workout')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Workout
    </button>

var DOT = {glute:"#ff6eb4", core:"#f0c060", upper:"#80c8ff", pump:"#b088ff", rest:"#3d3342"};

function dbLoad() { try { return JSON.parse(localStorage.getItem("glute12w") || "{}"); } catch(e) { return {}; } }
function dbSave(db) { try { localStorage.setItem("glute12w", JSON.stringify(db)); } catch(e) {} }
function dbKey(w, ex) { return "w" + w + "_" + ex; }
function dbGet(db, w, ex) { return db[dbKey(w, ex)] || null; }
function dbSet(db, w, ex, val) { db[dbKey(w, ex)] = val; dbSave(db); }

function getHistory(db, ex) {
  var out = [];
  for (var w = 1; w <= 12; w++) {
    var d = dbGet(db, w, ex);
    if (d && d.sets) {
      var has = false;
      for (var i = 0; i < d.sets.length; i++) { if (d.sets[i].kg || d.sets[i].reps) { has = true; break; } }
      if (has) out.push({week:w, sets:d.sets, date:d.date||""});
    }
  }
  return out;
}
function getLastPerf(db, week, ex) {
  for (var w = week - 1; w >= 1; w--) {
    var d = dbGet(db, w, ex);
    if (d && d.sets) {
      var done = [];
      for (var i = 0; i < d.sets.length; i++) { if (d.sets[i].kg || d.sets[i].reps) done.push(d.sets[i]); }
      if (done.length) return {week:w, sets:done};
    }
  }
  return null;
}
function getDone(db, week, ex) {
  var d = dbGet(db, week, ex);
  if (!d || !d.sets) return 0;
  var c = 0;
  for (var i = 0; i < d.sets.length; i++) { if (d.sets[i].done) c++; }
  return c;
}
function g(id) { return document.getElementById(id); }

function setTab(tab) {
  curTab = tab;
  ["workout","progress","overview"].forEach(function(t) {
    g("nb-" + t).classList.toggle("active", t === tab);
    var v = g("v-" + t);
    if (t === tab) v.classList.remove("hidden"); else v.classList.add("hidden");
  });
  if (tab === "workout")  renderWorkout();
  if (tab === "progress") renderProgress();
  if (tab === "overview") renderOverview();
}

function selectWeek(n) { curWeek = n; renderWorkout(); }

function renderWorkout() {
  var db = dbLoad();
  var wk = WEEKS[curWeek - 1];

  var chips = "";
  for (var i = 0; i < WEEKS.length; i++) {
    var w = WEEKS[i];
    chips += '<button class="wchip' + (w.n === curWeek ? " active" : "") + (w.phase==="Peak"?" peak":"") + '" onclick="selectWeek(' + w.n + ')">W' + w.n + '</button>';
  }

  var banner = '<div class="week-banner ' + wk.pc + '">' +
    '<div class="wb-left"><div class="wb-phase">' + wk.phase + '</div><div class="wb-title">Week ' + wk.n + ' of 12</div></div>' +
    '<div class="wb-stats">' +
      '<div class="wb-stat"><div class="wb-val">' + wk.sets + '</div><div class="wb-lbl">Sets</div></div>' +
      '<div class="wb-stat"><div class="wb-val">' + wk.reps + '</div><div class="wb-lbl">Reps</div></div>' +
      '<div class="wb-stat"><div class="wb-val">' + wk.days + '</div><div class="wb-lbl">Days</div></div>' +
    '</div></div>';

  var activeSplit = wk.days >= 4 ? SPLIT : SPLIT.slice(0, 3);
  var allEx = [];
  for (var di = 0; di < activeSplit.length; di++) { for (var ei = 0; ei < activeSplit[di].ex.length; ei++) allEx.push(activeSplit[di].ex[ei]); }
  var weekDone = allEx.length > 0 && allEx.every(function(ex) { return getDone(db, curWeek, ex) >= wk.sets; });

  var days = "";
  for (var d = 0; d < activeSplit.length; d++) {
    var day = activeSplit[d];
    var rows = "";
    for (var e = 0; e < day.ex.length; e++) {
      var ex = day.ex[e];
      var done = getDone(db, curWeek, ex);
      var isDone = done >= wk.sets;
      var last = getLastPerf(db, curWeek, ex);
      var lastStr = "No previous data";
      if (last && last.sets.length) {
        var maxKg = 0;
        for (var s = 0; s < last.sets.length; s++) { if (last.sets[s].kg && +last.sets[s].kg > maxKg) maxKg = +last.sets[s].kg; }
        lastStr = "Wk" + last.week + ": " + (maxKg > 0 ? maxKg + " kg" : "--");
      }
      var safeEx = encodeURIComponent(ex);
      rows += '<div class="ex-row" onclick="openModal(\'' + safeEx + '\',\'' + day.type + '\')">' +
        '<div class="ex-info"><div class="ex-name">' + ex + '</div><div class="ex-last' + (last?" has":"") + '">' + lastStr + '</div></div>' +
        '<div class="ex-right"><div class="ex-rx">' + wk.sets + 'x' + wk.reps + '</div><div class="ex-bubble' + (isDone?" done":"") + '">' + done + '/' + wk.sets + '</div>' +
          '<button class="quick-done-btn' + (isDone ? " all-done" : "") + '" onclick="event.stopPropagation();quickCompleteEx(\'' + safeEx + '\')" title="Mark all sets done">' +
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' +
          '</button>' +
        '</div>' +
      '</div>';
    }
    var dayAllDone = day.ex.length > 0 && day.ex.every(function(exName){ return getDone(db, curWeek, exName) >= wk.sets; });
    days += '<div class="day-section">' +
      '<div class="day-header t-' + day.type + '">' +
        '<div class="day-dot"></div>' +
        '<div class="day-day">DAY ' + day.day + '</div>' +
        '<div class="day-type">' + day.label + '</div>' +
        '<div class="day-sub">' + day.sub + '</div>' +
        '<button class="day-done-btn' + (dayAllDone ? " done" : "") + '" onclick="event.stopPropagation();markDayDone(' + d + ')">' + (dayAllDone ? "Day done" : "Mark done") + '</button>' +
      '</div>' +
      '<div class="ex-list">' + rows + '</div></div>';
  }

  g("v-workout").innerHTML =
    '<div class="page-header"><h1>GluteBuilder <span>12W</span></h1><p>' + wk.phase + ' - ' + wk.sets + ' sets - ' + wk.reps + ' reps - ' + wk.days + ' days this week</p></div>' +
    '<div class="week-strip" id="wstrip">' + chips + '</div>' +
    banner +
    (weekDone ? '<div class="week-complete-bar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Week ' + wk.n + ' complete - you smashed it!</div>' : '') +
    '<div class="coach-note">' + wk.note + '</div>' +
    days +
    '<div style="height:8px"></div>';

  setTimeout(function() {
    var strip = g("wstrip");
    if (!strip) return;
    var active = strip.querySelector(".wchip.active");
    if (active) active.scrollIntoView({inline:"center", behavior:"smooth", block:"nearest"});
  }, 50);
}

function openModal(safeEx, dayType) {
  var ex = decodeURIComponent(safeEx);
  curExName = ex;
  timerDuration = (EX_TIMERS[ex] !== undefined) ? EX_TIMERS[ex] : DEFAULT_TIMER;
  var db = dbLoad();
  var wk = WEEKS[curWeek - 1];
  curNumSets = wk.sets;
  var existing = dbGet(db, curWeek, ex);
  var history  = getHistory(db, ex);
  var last     = getLastPerf(db, curWeek, ex);
  var suggestKg = 0;
  if (last && last.sets.length) {
    for (var s = 0; s < last.sets.length; s++) { if (last.sets[s].kg && +last.sets[s].kg > suggestKg) suggestKg = +last.sets[s].kg; }
  }

  var sets = existing && existing.sets ? existing.sets.slice() : [];
  while (sets.length < wk.sets) sets.push({kg:"", reps:"", done:false});

  var setRows = "";
  for (var i = 0; i < sets.length; i++) {
    var s = sets[i];
    var kgPh = suggestKg > 0 ? suggestKg : "kg";
    var repsPh = wk.reps.split("-")[0];
    setRows += '<div class="set-row">' +
      '<div class="set-num">SET ' + (i+1) + '</div>' +
      '<div class="set-inputs">' +
        '<div class="field-wrap"><input class="set-input" type="number" id="kg' + i + '" value="' + (s.kg||"") + '" placeholder="' + kgPh + '" inputmode="decimal" step="0.5" min="0"><div class="field-lbl">KG</div></div>' +
        '<div class="field-wrap"><input class="set-input" type="number" id="rp' + i + '" value="' + (s.reps||"") + '" placeholder="' + repsPh + '" inputmode="numeric" min="0" max="99"><div class="field-lbl">REPS</div></div>' +
      '</div>' +
      '<button class="check-btn' + (s.done?" done":"") + '" id="chk' + i + '" onclick="toggleCheck(' + i + ',' + suggestKg + ',\'' + repsPh + '\')">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' +
      '</button></div>';
  }

  var histHtml = "";
  if (history.length) {
    histHtml = '<div class="history-sec"><div class="history-title">History</div>';
    var recent = history.slice().reverse().slice(0,5);
    for (var h = 0; h < recent.length; h++) {
      var entry = recent[h];
      var setsHtml = "";
      for (var si = 0; si < entry.sets.length; si++) {
        var sv = entry.sets[si];
        if (sv.kg || sv.reps) setsHtml += '<div class="hist-set">' + (sv.kg||"?") + 'kg x ' + (sv.reps||"?") + '</div>';
      }
      histHtml += '<div class="hist-entry"><div class="hist-wk">Week ' + entry.week + (entry.date?" - "+entry.date:"") + '</div><div class="hist-sets">' + setsHtml + '</div></div>';
    }
    histHtml += '</div>';
  }

  g("modal").innerHTML =
    '<div class="modal-handle"></div>' +
    '<div class="modal-head">' +
      '<div class="modal-daytype">' + dayType.toUpperCase() + '</div>' +
      '<div class="modal-title" onclick="showExInfo(\'' + safeEx + '\')">' + ex + ' <span class="modal-title-hint">?</span></div>' +
      '<div class="modal-sub">' + wk.sets + ' sets - ' + wk.reps + ' reps - ' + wk.rir + ' - Week ' + wk.n + '</div>' +
      (suggestKg > 0 ? '<div class="modal-hint">Last logged: ' + suggestKg + ' kg</div>' : '') +
    '</div>' +
    '<div class="set-logger"><div class="logger-title">Log Sets</div>' + setRows + '</div>' +
    histHtml +
    '<div class="timer-adjust"><div class="timer-adjust-label">Rest timer</div>' +
    '<div class="timer-dur-pick">' +
    '<button class="dur-btn" data-dur="60" onclick="setTimerDuration(60)">1:00</button>' +
    '<button class="dur-btn" data-dur="90" onclick="setTimerDuration(90)">1:30</button>' +
    '<button class="dur-btn" data-dur="120" onclick="setTimerDuration(120)">2:00</button>' +
    '<button class="dur-btn" data-dur="180" onclick="setTimerDuration(180)">3:00</button>' +
    '</div></div>' +
    '<div class="modal-actions">' +
    '<button class="btn btn-primary" onclick="saveModal()">Save Sets</button>' +
    '<button class="btn btn-ghost" onclick="closeModal()">Close</button>' +
    '</div><div style="height:8px"></div>';

  g("overlay").classList.add("open");
  setTimeout(function(){ document.querySelectorAll(".dur-btn").forEach(function(b){ b.classList.toggle("active", +b.dataset.dur === timerDuration); }); }, 10);
}

function toggleCheck(i, suggestKg, repsPh) {
  var btn = g("chk" + i);
  btn.classList.toggle("done");
  if (btn.classList.contains("done")) {
    var kgEl = g("kg" + i);
    var rpEl = g("rp" + i);
    if (kgEl && !kgEl.value && suggestKg) kgEl.value = suggestKg;
    if (rpEl && !rpEl.value) rpEl.value = repsPh;
    startTimer();
  } else {
    stopTimer();
  }
}

function saveModal() {
  var ex = curExName;
  var numSets = curNumSets;
  var db = dbLoad();
  var sets = [];
  for (var i = 0; i < numSets; i++) {
    var kgEl  = g("kg"  + i);
    var rpEl  = g("rp"  + i);
    var chkEl = g("chk" + i);
    sets.push({kg:kgEl?kgEl.value:"", reps:rpEl?rpEl.value:"", done:chkEl?chkEl.classList.contains("done"):false});
  }
  var now = new Date();
  var date = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-" + String(now.getDate()).padStart(2,"0");
  dbSet(db, curWeek, ex, {sets:sets, date:date});
  closeModal();
  renderWorkout();
}

function quickCompleteEx(safeEx) {
  var ex = decodeURIComponent(safeEx);
  var db = dbLoad();
  var wk = WEEKS[curWeek - 1];
  curNumSets = wk.sets;
  var existing = dbGet(db, curWeek, ex);
  var last = getLastPerf(db, curWeek, ex);
  var sets = [];
  var now = new Date();
  var date = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-" + String(now.getDate()).padStart(2,"0");
  for (var i = 0; i < wk.sets; i++) {
    var existSet = existing && existing.sets && existing.sets[i] ? existing.sets[i] : null;
    var lastSet  = last && last.sets && last.sets[i] ? last.sets[i] : null;
    var kg   = (existSet && existSet.kg)   ? existSet.kg   : (lastSet && lastSet.kg   ? lastSet.kg   : "");
    var reps = (existSet && existSet.reps) ? existSet.reps : (lastSet && lastSet.reps ? lastSet.reps : wk.reps.split("-")[0]);
    sets.push({kg: kg, reps: reps, done: true});
  }
  dbSet(db, curWeek, ex, {sets: sets, date: date});
  renderWorkout();
}

function markDayDone(dayIdx) {
  var db = dbLoad();
  var wk = WEEKS[curWeek - 1];
  var day = SPLIT[dayIdx];
  var now = new Date();
  var date = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-" + String(now.getDate()).padStart(2,"0");
  for (var e = 0; e < day.ex.length; e++) {
    var ex = day.ex[e];
    var existing = dbGet(db, curWeek, ex);
    var last = getLastPerf(db, curWeek, ex);
    var allDone = existing && existing.sets && existing.sets.every(function(s){ return s.done; });
    if (allDone) continue;
    var sets = [];
    for (var i = 0; i < wk.sets; i++) {
      var existSet = existing && existing.sets && existing.sets[i] ? existing.sets[i] : null;
      var lastSet  = last && last.sets && last.sets[i] ? last.sets[i] : null;
      var kg   = (existSet && existSet.kg)   ? existSet.kg   : (lastSet && lastSet.kg   ? lastSet.kg   : "");
      var reps = (existSet && existSet.reps) ? existSet.reps : (lastSet && lastSet.reps ? lastSet.reps : wk.reps.split("-")[0]);
      sets.push({kg: kg, reps: reps, done: true});
    }
    dbSet(db, curWeek, ex, {sets: sets, date: date});
  }
  renderWorkout();
}

function setTimerDuration(sec) {
  timerDuration = sec;
  document.querySelectorAll(".dur-btn").forEach(function(b){ b.classList.toggle("active", +b.dataset.dur === sec); });
}

function startTimer() {
  stopTimer();
  timerRemaining = timerDuration;
  var bar = g("timer-bar");
  if (bar) bar.classList.add("visible");
  updateTimerDisplay();
  timerInterval = setInterval(function() {
    timerRemaining--;
    updateTimerDisplay();
    if (timerRemaining <= 0) { stopTimer(); timerDone(); }
  }, 1000);
}
function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  timerRemaining = 0;
  var bar = g("timer-bar");
  if (bar) bar.classList.remove("visible");
}
function timerDone() {
  var bar = g("timer-bar");
  if (bar) bar.classList.add("visible");
  var cd = g("timer-countdown");
  if (cd) { cd.textContent = "GO!"; cd.classList.add("done"); }
  playBeep();
  if (typeof Notification !== "undefined" && Notification.permission === "granted") {
    new Notification("Rest over!", {body:"Time for your next set.", icon:"/GluteBuilder/icon-192.png"});
  }
  setTimeout(function() {
    var bar2 = g("timer-bar");
    if (bar2) bar2.classList.remove("visible");
    var cd2 = g("timer-countdown");
    if (cd2) { cd2.textContent = String(Math.floor(timerDuration/60)) + ":" + (timerDuration%60 < 10 ? "0" : "") + (timerDuration%60); cd2.classList.remove("done"); }
  }, 3000);
}
function playBeep() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(freq, start, dur) {
      var o = ctx.createOscillator(); var gn = ctx.createGain();
      o.connect(gn); gn.connect(ctx.destination);
      o.frequency.value = freq; o.type = "sine";
      gn.gain.setValueAtTime(0.4, ctx.currentTime + start);
      gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      o.start(ctx.currentTime + start); o.stop(ctx.currentTime + start + dur);
    }
    beep(880, 0, 0.15); beep(880, 0.18, 0.15); beep(1100, 0.36, 0.3);
  } catch(e) {}
}
function updateTimerDisplay() {
  var cd   = g("timer-countdown");
  var ring = g("timer-ring-fg");
  if (!cd) return;
  var mins = Math.floor(timerRemaining / 60);
  var secs = timerRemaining % 60;
  cd.textContent = mins + ":" + (secs < 10 ? "0" : "") + secs;
  var pct = timerDuration > 0 ? timerRemaining / timerDuration : 0;
  var circ = 2 * Math.PI * 17;
  if (ring) { ring.style.strokeDasharray = circ; ring.style.strokeDashoffset = circ * (1 - pct); }
}

function renderProgress() {
  var db = dbLoad();
  var totalSets = 0, totalEx = 0;
  var prs = {};
  var weeksLogged = {};
  for (var w = 1; w <= 12; w++) {
    for (var d = 0; d < SPLIT.length; d++) {
      for (var e = 0; e < SPLIT[d].ex.length; e++) {
        var ex = SPLIT[d].ex[e];
        var data = dbGet(db, w, ex);
        if (data && data.sets) {
          var hasDone = false;
          for (var si = 0; si < data.sets.length; si++) {
            var s = data.sets[si];
            if (s.done || s.kg || s.reps) { hasDone = true; totalSets++; }
          }
          if (hasDone) {
            totalEx++; weeksLogged[w] = true;
            var maxKg = 0;
            for (var si2 = 0; si2 < data.sets.length; si2++) { if (data.sets[si2].kg && +data.sets[si2].kg > maxKg) maxKg = +data.sets[si2].kg; }
            if (maxKg > 0 && (!prs[ex] || maxKg > prs[ex].kg)) prs[ex] = {kg:maxKg, week:w};
          }
        }
      }
    }
  }
  var weeksCount = Object.keys(weeksLogged).length;
  var pct = Math.round((weeksCount / 12) * 100);
  var prArr = [];
  for (var exKey in prs) { prArr.push({ex:exKey, kg:prs[exKey].kg, week:prs[exKey].week}); }
  prArr.sort(function(a,b){ return b.kg - a.kg; });
  prArr = prArr.slice(0,12);
  var prHtml = prArr.length ? prArr.map(function(p){ return '<div class="pr-row"><div class="pr-ex">' + p.ex + '</div><div class="pr-val">' + p.kg + ' kg <span style="color:var(--text3);font-size:10px">Wk'+p.week+'</span></div></div>'; }).join("") : '<div style="font-size:12px;color:var(--text3);font-style:italic">No weights logged yet.</div>';
  var heatmap = "";
  for (var wi = 0; wi < WEEKS.length; wi++) {
    var ww = WEEKS[wi];
    var active = !!weeksLogged[ww.n];
    var col = active ? (ww.phase==="Deload"?"var(--gold)":ww.phase==="Peak"?"var(--pump)":"var(--accent)") : "var(--surface2)";
    heatmap += '<div style="display:flex;flex-direction:column;align-items:center;gap:3px"><div style="width:100%;aspect-ratio:1;border-radius:5px;background:' + col + ';opacity:' + (active?1:0.4) + '"></div><div style="font-size:9px;color:var(--text3);font-family:\'DM Mono\',monospace">W' + ww.n + '</div></div>';
  }
  g("v-progress").innerHTML =
    '<div class="page-header"><h1>Your <span>Progress</span></h1><p>12-week tracking overview</p></div>' +
    '<div class="prog-content">' +
      '<div class="prog-card"><div class="prog-card-title">Program Progress</div>' +
        '<div class="stat-row"><div class="stat-name">Weeks active</div><div><span class="stat-val">' + weeksCount + '</span><span class="stat-unit">/ 12</span></div></div>' +
        '<div class="progress-bar-wrap"><div class="progress-bar" style="width:' + pct + '%"></div></div>' +
        '<div style="font-size:11px;color:var(--text3);margin-top:6px;font-family:\'DM Mono\',monospace;text-align:right">' + pct + '% complete</div>' +
      '</div>' +
      '<div class="prog-card"><div class="prog-card-title">Volume</div>' +
        '<div class="stat-row"><div class="stat-name">Total sets logged</div><div><span class="stat-val">' + totalSets + '</span></div></div>' +
        '<div class="stat-row"><div class="stat-name">Exercise sessions</div><div><span class="stat-val">' + totalEx + '</span></div></div>' +
      '</div>' +
      '<div class="prog-card"><div class="prog-card-title">Top Weights (PRs)</div>' + prHtml + '</div>' +
      '<div class="prog-card"><div class="prog-card-title">Week Activity</div><div style="display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-top:4px">' + heatmap + '</div></div>' +
    '</div>';
}

  var phaseCards = PHASE_CARDS.map(function(p) {
